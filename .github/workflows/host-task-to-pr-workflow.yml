name: Host task-to-pr workflow

on:
  push:
    branches: [main]
    paths:
      - 'plugins/comp-lib-process/skills/task-to-pr/task-to-pr-architecture.html'
      - '.github/workflows/host-task-to-pr-workflow.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp plugins/comp-lib-process/skills/task-to-pr/task-to-pr-architecture.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
